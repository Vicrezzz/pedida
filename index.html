<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>💕</title>
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script defer src="assets/js/script.js"></script>
  </head>
  <body>
    <div class="bg-hearts" id="bg-hearts"></div>

    <!-- ═══════════ POPUP ═══════════ -->
    <div id="popup-overlay">
      <div class="popup-card">
        <span class="popup-ornament">🌹</span>
        <h1 class="popup-title">Déjame hablar...</h1>
        <p class="popup-subtitle">hay algo que necesito decirte</p>
      </div>

      <div class="continue-wrap">
        <span id="countdown-text">espera 25s...</span>
        <button id="continue-btn" disabled>Continuar</button>
      </div>
    </div>

    <!-- ═══════════ MAIN PAGE ═══════════ -->
    <div id="main-page">
      <div class="main-ornament">💗</div>
      <h1 class="main-title">Nouha<br /><span></span></h1>
      <h1 class="main-title">¿Quieres ser<br /><span>mi novia?</span></h1>
      <div class="deco-row">
        <div class="deco-line"></div>
        <div class="deco-diamond"></div>
        <div class="deco-line"></div>
      </div>
      <p class="subtitle">
        mira que no buscaba amor, pero imposible no quererlo todo contigo...
      </p>

      <div class="buttons-row">
        <button class="btn-si" id="btn-si">Sí 💕</button>
        <div id="btn-no-ph"></div>
        <!-- placeholder to balance centering -->
      </div>
    </div>

    <!-- NO button roams freely in fixed space -->
    <button id="btn-no">No</button>

    <!-- ═══════════ SUCCESS ═══════════ -->
    <div id="success-screen">
      <div class="main-ornament" style="font-size: 4rem; line-height: 1">
        💖
      </div>
      <h2 class="success-title">
        Eres de lo más bonito que me está pasando...
      </h2>
      <div class="deco-row" style="margin-top: 0.5rem">
        <div class="deco-line"></div>
        <div class="deco-diamond"></div>
        <div class="deco-line"></div>
      </div>
    </div>

    <!-- Decorative audio badge — purely visual, no interaction -->
    <div id="audio-badge">
      <svg
        class="music-icon-gradient"
        viewBox="0 0 24 24"
        version="1.1"
        xmlns="http://www.w3.org/2000/svg"
        xmlns:xlink="http://www.w3.org/1999/xlink"
      >
        <defs>
          <linearGradient
            id="gold-gradient-metallic"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="100%"
          >
            <stop offset="0%" style="stop-color: #bf953f; stop-opacity: 1" />
            <stop offset="25%" style="stop-color: #fcf6ba; stop-opacity: 1" />
            <stop offset="50%" style="stop-color: #b38728; stop-opacity: 1" />
            <stop offset="75%" style="stop-color: #fbf5b7; stop-opacity: 1" />
            <stop offset="100%" style="stop-color: #aa771c; stop-opacity: 1" />
          </linearGradient>
        </defs>
        <path
          d="M12 3V13.55C11.41 13.21 10.73 13 10 13C7.79 13 6 14.79 6 17C6 19.21 7.79 21 10 21C12.21 21 14 19.21 14 17V7H18V3H12Z"
          fill="url(#gold-gradient-metallic)"
        />
      </svg>
      <span>Reproduciendo M.A.I — Milo J</span>
    </div>

    <!--
  ════════════════════════════════════════════
  AUDIO
  ════════════════════════════════════════════
-->
    <audio id="bg-audio" loop preload="auto">
      <source src="assets/audio/M.A.I.mp3" type="audio/mpeg" />
    </audio>
  </body>
</html>
